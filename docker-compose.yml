services:
  api:
    build: . # Build the Docker image from the current directory
    command: npm run dev # Override Dockerfile command and run dev mode
    ports:
      - "20000:20000"
    env_file:
      - .env
    volumes:
      - .:/app #mounts code into container
      - /app/node_modules #protects container dependencies from being overwritten
    depends_on:
      - postgres-practice
      - redis-practice
      - vault-practice

  postgres-practice:
    image: postgres:15-alpine
    container_name: postgres-practice
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5435:5432"
    volumes:  
      - postgres-data-test:/var/lib/postgresql/data
    
  redis-practice:
    image: redis:7-alpine
    container_name: redis-practice
    restart: always
    ports:
      - "6381:6379"
    volumes:
      - redis-data-test:/data
  
  vault-practice:
    image: hashicorp/vault:latest
    container_name: vault-practice
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=${VAULT_DEV_ROOT_TOKEN_ID} # Set your root token
      - VAULT_ADDR=http://127.0.0.1:8200
      - SKIP_SETCAP=true  # Bypasses the failing capability check
      - SKIP_CHOWN=true 
    cap_add:
      - IPC_LOCK


volumes:
  postgres-data-test:
  redis-data-test:
